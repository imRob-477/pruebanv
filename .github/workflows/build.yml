name: Build APK

on:
  push:
      branches: [ main ]

      jobs:
        build:
            runs-on: ubuntu-latest
                
                    steps:
                        - uses: actions/checkout@v3
                            
                                - name: Set up Python
                                      uses: actions/setup-python@v4
                                            with:
                                                    python-version: '3.11'
                                                        
                                                            - name: Install dependencies
                                                                  run: |
                                                                          pip install buildozer cython
                                                                                  apt-get update && apt-get install -y openjdk-11-jdk-headless android-sdk
                                                                                      
                                                                                          - name: Build APK
                                                                                                run: |
                                                                                                        cd game
                                                                                                                buildozer android release
                                                                                                                    
                                                                                                                        - name: Upload APK
                                                                                                                              uses: actions/upload-artifact@v3
                                                                                                                                    with:
                                                                                                                                            name: pruebanv-apk
                                                                                                                                                    path: game/bin/*.apk