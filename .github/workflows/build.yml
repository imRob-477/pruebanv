name: Build APK
on:
  push:
      branches: [main]
      jobs:
        build:
            runs-on: ubuntu-latest
                steps:
                      - uses: actions/checkout@v3
                            - uses: actions/setup-python@v4
                                    with:
                                              python-version: '3.10'
                                                    - run: pip install buildozer cython
                                                          - run: cd game && buildozer android release
                                                                - uses: actions/upload-artifact@v3
                                                                        with:
                                                                                  name: apk
                                                                                            path: game/bin/*.apk