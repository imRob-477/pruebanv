name: Build
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install buildozer cython
      - run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk build-essential libffi-dev python3-dev
      - run: cd game && buildozer android release
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: game/bin/*.apk
