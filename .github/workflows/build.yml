name: Build APK

on:
  push:
      branches:
            - main

            jobs:
              build:
                  runs-on: ubuntu-latest
                      steps:
                            - uses: actions/checkout@v3

                                  - name: Set up Python
                                          uses: actions/setup-python@v4
                                                  with:
                                                            python-version: '3.10'

                                                                  - name: Install Buildozer
                                                                          run: pip install buildozer cython

                                                                                - name: Build Android
                                                                                        run: cd game && buildozer android release

                                                                                              - name: Upload APK
                                                                                                      uses: actions/upload-artifact@v3
                                                                                                              with:
                                                                                                                        name: apk
                                                                                                                                  path: game/bin/*.apk